name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Project
        run: |
          TARFILE=$(find . -name "*.tar.gz" | head -n 1)

          if [ -z "$TARFILE" ]; then
            echo "No se encontró ningún archivo .tar.gz"
            exit 1
          fi

          mkdir project
          tar -xzf "$TARFILE" -C project

      - name: Find Gradle Wrapper
        id: gradle
        run: |
          GRADLEW=$(find project -type f -name gradlew | head -n 1)

          if [ -z "$GRADLEW" ]; then
